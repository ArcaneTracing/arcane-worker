# SonarQube Project Configuration
sonar.projectKey=arcane-worker
sonar.projectName=arcane-worker
sonar.projectVersion=1.0.0

# Source code
sonar.sources=app
sonar.sourceEncoding=UTF-8

# Test code
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/htmlcov/**,**/.venv/**,**/venv/**,**/env/**,**/build/**,**/dist/**,**/*.egg-info/**,**/.sonar/**

# Python
sonar.python.version=3.12

# Coverage reports (pytest-cov generates XML reports)
sonar.python.coverage.reportPaths=.coverage,coverage.xml,htmlcov/coverage.xml
sonar.coverage.exclusions=**/__init__.py,**/tests/**,**/test_*.py,**/*_test.py

# Test execution reports (if using pytest with junitxml)
# sonar.testExecutionReportPaths=test-reports/junit.xml

# Code analysis
sonar.python.xunit.reportPath=test-reports

# Language
sonar.language=py
